services:
  - type: web
    name: moneynlaw-cms
    env: python
    plan: free
    rootDir: apps/cms-wagtail
    buildCommand: pip install . && python manage.py collectstatic --noinput
    startCommand: python manage.py migrate && python manage.py bootstrap_cms_rbac && python manage.py bootstrap_cms_reporter_user --username "${CMS_REPORTER_USERNAME:-reporter}" --email "${CMS_REPORTER_EMAIL:-reporter@moneynlaw.local}" --password "${CMS_REPORTER_PASSWORD:-ChangeMe123!}" && gunicorn mnl_cms.wsgi:application --bind 0.0.0.0:$PORT
    healthCheckPath: /api/v1/newsroom/articles/?limit=1
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DJANGO_DEBUG
        value: "0"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        sync: false
      - key: WAGTAILADMIN_BASE_URL
        sync: false
      - key: CMS_REPORTER_USERNAME
        value: reporter
      - key: CMS_REPORTER_EMAIL
        value: reporter@moneynlaw.local
      - key: CMS_REPORTER_PASSWORD
        generateValue: true
